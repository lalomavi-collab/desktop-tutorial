# Build the Lawink web app (ldr/web) and publish it to GitHub Pages.
# Uses the built-in GITHUB_TOKEN — no external hosting credentials needed.
name: Deploy Lawink to Pages

on:
  push:
    branches: [main, claude/confident-tesla-5weora]
    paths:
      - "ldr/web/**"
      - ".github/workflows/deploy-lawink.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ldr/web
    env:
      # Supabase publishable (anon) key — safe to expose in the browser; RLS
      # protects the data and this value ships in the client bundle by design.
      VITE_SUPABASE_URL: https://stqfkejfhvdkjnmdpdhw.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_IkHt8ohb1HSClGcJoChLEQ_jgXZt-qF
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ldr/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
