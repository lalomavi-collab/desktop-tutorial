name: "📋 Zoom Meeting Summary Processor"

on:
  schedule:
    # Runs every 30 minutes, 24/7
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: "How many minutes back to look for ended meetings"
        required: false
        default: "120"

jobs:
  process-meetings:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit processed.json state

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Install dependencies"
        run: pip install anthropic requests

      - name: "🔍 Process Zoom meetings"
        env:
          ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: "avraham@lalum.co"
          LOOKBACK_MINUTES: ${{ inputs.lookback_minutes || '65' }}
        run: python -m zoom_meetings.processor

      - name: "💾 Save processed state"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zoom_meetings/processed.json || true
          git diff --staged --quiet || git commit -m "chore: update processed meetings state [skip ci]"
          git push || true
