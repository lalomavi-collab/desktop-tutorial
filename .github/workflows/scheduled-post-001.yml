name: "\U0001F4E2 Post 001: The Legal Algorist"

on:
  # Saturday April 5, 2026 at 20:00 Israel Time (17:00 UTC)
  schedule:
    - cron: '0 17 5 4 *'
  workflow_dispatch:

jobs:
  post-hebrew:
    name: "\U0001F1EE\U0001F1F1 Hebrew - All Platforms"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "\U0001F4E4 Send to Facebook"
        run: |
          MESSAGE=$(cat posts/001_legal_algorist_he.md)
          curl -s -X POST "${{ secrets.ZAPIER_FACEBOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": $(echo "$MESSAGE" | jq -Rs .)}"
          echo "Facebook: SENT"

      - name: "\U0001F4E4 Send to Telegram"
        run: |
          MESSAGE=$(cat posts/001_legal_algorist_he.md)
          curl -s -X POST "${{ secrets.ZAPIER_TELEGRAM }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": $(echo "$MESSAGE" | jq -Rs .)}"
          echo "Telegram: SENT"

      - name: "\U0001F4E4 Send to Instagram"
        run: |
          MESSAGE=$(cat posts/001_legal_algorist_he.md)
          curl -s -X POST "${{ secrets.ZAPIER_INSTAGRAM }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": $(echo "$MESSAGE" | jq -Rs .)}"
          echo "Instagram: SENT"

  post-english:
    name: "\U0001F1EC\U0001F1E7 English - LinkedIn"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "\U0001F4E4 Send to LinkedIn (English)"
        run: |
          MESSAGE=$(cat posts/001_legal_algorist_en.md)
          curl -s -X POST "${{ secrets.ZAPIER_LINKEDIN }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": $(echo "$MESSAGE" | jq -Rs .)}"
          echo "LinkedIn (EN): SENT"

  summary:
    name: "\u2705 Post Summary"
    needs: [post-hebrew, post-english]
    runs-on: ubuntu-latest
    steps:
      - name: "Summary"
        run: |
          echo "============================================"
          echo "Post 001: The Legal Algorist"
          echo "============================================"
          echo ""
          echo "Hebrew (Facebook, Telegram, Instagram): SENT"
          echo "English (LinkedIn): SENT"
          echo ""
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "============================================"

  notify:
    name: "\ud83d\udd14 Telegram Notification"
    needs: [post-hebrew, post-english]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: "\ud83d\udcf2 Notify via Telegram"
        run: |
          STATUS="${{ needs.post-hebrew.result == 'success' && needs.post-english.result == 'success' && '\u2705 \u05d4\u05e6\u05dc\u05d9\u05d7' || '\u274c \u05e0\u05db\u05e9\u05dc' }}"
          MESSAGE="$STATUS \u2014 \u05e4\u05d5\u05e1\u05d8 001: The Legal Algorist
\u05e9\u05d5\u05dc\u05d7 \u05d0\u05dc: \u05e4\u05d9\u05d9\u05e1\u05d1\u05d5\u05e7, \u05d8\u05dc\u05d2\u05e8\u05dd, \u05d0\u05d9\u05e0\u05e1\u05d8\u05d2\u05e8\u05dd, \u05dc\u05d9\u05e0\u05e7\u05d3\u05d0\u05d9\u05df
\u05d6\u05de\u05df: $(date -u '+%d/%m/%Y %H:%M UTC')
Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "${{ secrets.ZAPIER_TELEGRAM }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": $(echo "$MESSAGE" | jq -Rs .)}"
