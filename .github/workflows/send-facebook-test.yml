name: 'Send Facebook Test Message'
on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to post on Facebook'
        required: true
        default: 'Test message from GitHub Actions'

jobs:
  send-facebook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send test message to Facebook
        run: |
          MESSAGE="${{ github.event.inputs.message }}"
          curl -s -X POST "https://graph.facebook.com/v19.0/${{ secrets.FACEBOOK_PAGE_ID }}/feed" \
            --data-urlencode "access_token=${{ secrets.FACEBOOK_ACCESS_TOKEN }}" \
            --data-urlencode "message=$MESSAGE" \
            -o response.json
          if grep -q "error" response.json; then
            echo "Error posting to Facebook:"
            cat response.json
            exit 1
          else
            echo "Message posted successfully"
            cat response.json
          fi
