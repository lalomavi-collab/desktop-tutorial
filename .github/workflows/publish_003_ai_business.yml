            -H "Content-Type: application/json" \
            -d '{
              "caption": "💼 5 כלי AI לעסק שלך:\n\n1️⃣ ChatGPT — תוכן ומיילים\n2️⃣ Canva AI — עיצוב\n3️⃣ Zapier — אוטומציה\n4️⃣ Notion AI — ניהול\n5️⃣ Claude — אסטרטגיה\n\n↳ LALUM | Legal Architecture\nwww.lalum.co\n\n#AI #עסקיםקטנים #LALUM"
            }'

