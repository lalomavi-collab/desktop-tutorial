name: "🔌 Test Telegram Connection"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '.github/workflows/test-telegram-connection.yml'
      - 'scripts/notify-telegram.sh'
      - 'prompt_builder/utils/telegram.py'

jobs:
  test-telegram:
    name: "בדיקת חיבור טלגרם"
    runs-on: ubuntu-latest
    steps:
      - name: "📤 Send test message"
        id: send
        run: |
          MESSAGE="🔌 בדיקת חיבור — $(date -u '+%d/%m/%Y %H:%M UTC')

אם קיבלת הודעה זו — הכל עובד ✅

הסוכנים המחוברים:
• Claude Code (Stop Hook)
• Builder Agent (Python)
• Quick Build Agent (Python)
• Social Media Agent (GitHub Actions)
• שליחת פוסטים ידנית
• פוסטים מתוזמנים"

          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": $(echo "$MESSAGE" | jq -Rs .)}")

          echo "response=$RESPONSE" >> "$GITHUB_OUTPUT"

          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: "✅ Connection OK"
        if: contains(steps.send.outputs.response, '"ok":true')
        run: echo "✅ Telegram connection WORKING"

      - name: "❌ Connection FAILED"
        if: "!contains(steps.send.outputs.response, '\"ok\":true')"
        run: |
          echo "❌ Telegram connection FAILED"
          echo "Response: ${{ steps.send.outputs.response }}"
          echo "בדוק שה-secrets TELEGRAM_BOT_TOKEN ו-TELEGRAM_CHAT_ID מוגדרים נכון"
          exit 1
