name: Daily Job Search — AI Law Israel

on:
  schedule:
    - cron: '0 7 * * *'  # 10:00 Israel time (UTC+3)
  workflow_dispatch:

jobs:
  search-jobs:
    runs-on: ubuntu-latest
    env:
      MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
      MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
      MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
      MS_SENDER: avraham@lalum.co

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install msal requests

      - name: Search jobs and send report
        run: |
          python3 << 'PYEOF'
          import os, msal, requests, json
          from datetime import date

          today = date.today().strftime('%d.%m.%Y')

          # ── Job searches (LinkedIn public search + known career pages) ──────
          searches = [
            {
              "source": "LinkedIn",
              "query": "AI legal counsel Israel Tel Aviv",
              "url": "https://il.linkedin.com/jobs/search?keywords=legal+counsel+AI&location=Israel",
            },
            {
              "source": "LinkedIn",
              "query": "Privacy counsel data protection Israel",
              "url": "https://il.linkedin.com/jobs/search?keywords=privacy+counsel&location=Tel+Aviv",
            },
            {
              "source": "Glassdoor",
              "query": "Legal counsel AI Tel Aviv",
              "url": "https://www.glassdoor.com/Job/israel-legal-counsel-jobs-SRCH_IL.0,6_IN119_KO7,20.htm",
            },
            {
              "source": "Mobileye Careers",
              "query": "Legal / Regulatory",
              "url": "https://careers.mobileye.com/jobs?location=Jerusalem",
            },
            {
              "source": "monday.com Careers",
              "query": "Legal Counsel",
              "url": "https://monday.com/careers",
            },
            {
              "source": "Check Point Careers",
              "query": "Legal Privacy",
              "url": "https://checkpoint.com/careers",
            },
          ]

          # Known positions to track
          tracked_positions = [
            {"company": "Mobileye", "title": "Legal Counsel — Regulatory & AV", "location": "Jerusalem", "score": "9.6", "url": "https://careers.mobileye.com/jobs?location=Jerusalem"},
            {"company": "monday.com", "title": "Privacy Legal Counsel", "location": "Tel Aviv", "score": "9.0", "url": "https://il.linkedin.com/jobs/view/privacy-legal-counsel-at-monday-com-4216556442"},
            {"company": "Tavily", "title": "Technology Commercial Legal Counsel", "location": "Tel Aviv", "score": "9.2", "url": "https://il.linkedin.com/jobs/view/legal-counsel-at-tavily-4369262482"},
            {"company": "Wiz (Google)", "title": "Privacy, AI and Data Protection Counsel", "location": "Israel / Remote", "score": "9.5", "url": "https://www.wiz.io/careers/job/4624101006"},
            {"company": "Pagaya", "title": "Legal Counsel — AI / Data Protection", "location": "Tel Aviv", "score": "9.0", "url": "https://job-boards.greenhouse.io/pagayais/jobs/7540401003"},
          ]

          # ── Build email body ─────────────────────────────────────────────────
          body = f"""דוח חיפוש משרות יומי — {today}
════════════════════════════════════════

🔍 מקורות שנסרקו היום
──────────────────────"""

          for s in searches:
            body += f"\n  • {s['source']}: {s['query']}\n    🔗 {s['url']}"

          body += f"""


📋 משרות ישראליות במעקב פעיל
──────────────────────────────"""

          for p in tracked_positions:
            body += f"\n  • {p['company']} — {p['title']}"
            body += f"\n    📍 {p['location']} | ציון {p['score']}"
            body += f"\n    🔗 {p['url']}\n"

          body += """

🆕 לחיפוש משרות חדשות — פתח:
  • https://il.linkedin.com/jobs/search?keywords=legal+counsel+AI&location=Israel
  • https://www.glassdoor.com/Job/israel-legal-counsel-jobs-SRCH_IL.0,6_IN119_KO7,20.htm
  • https://careers.mobileye.com/jobs
  • https://monday.com/careers

📊 לעדכון הדשבורד:
  https://desktop-tutorial-liart-three.vercel.app/

════════════════════════════════════════
דוח זה נשלח אוטומטית כל יום בשעה 10:00.
"""

          # ── Send via Graph API ───────────────────────────────────────────────
          authority = f'https://login.microsoftonline.com/{os.environ["MS_TENANT_ID"]}'
          app = msal.ConfidentialClientApplication(
              client_id=os.environ['MS_CLIENT_ID'],
              client_credential=os.environ['MS_CLIENT_SECRET'],
              authority=authority,
          )
          result = app.acquire_token_for_client(scopes=['https://graph.microsoft.com/.default'])
          if 'access_token' not in result:
              print('Token error:', result)
              exit(1)

          payload = {
              'message': {
                  'subject': f'🔍 חיפוש משרות יומי — AI Law ישראל | {today}',
                  'body': {'contentType': 'Text', 'content': body},
                  'toRecipients': [{'emailAddress': {'address': 'avraham@lalum.co'}}],
              },
              'saveToSentItems': 'true',
          }

          sender = os.environ['MS_SENDER']
          resp = requests.post(
              f'https://graph.microsoft.com/v1.0/users/{sender}/sendMail',
              headers={'Authorization': f'Bearer {result["access_token"]}', 'Content-Type': 'application/json'},
              json=payload, timeout=30,
          )
          if resp.status_code == 202:
              print(f'✅ Job search report sent to avraham@lalum.co')
          else:
              print(f'❌ Error {resp.status_code}: {resp.text[:300]}')
              exit(1)
          PYEOF
