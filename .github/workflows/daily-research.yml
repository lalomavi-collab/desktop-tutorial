name: Daily Legal Research Agent 🔍

on:
  schedule:
    # Runs every day at 06:00 Israel time (03:00 UTC)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      date_override:
        description: "Override date (YYYY-MM-DD, leave empty for today)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  research:
    name: Fetch Trends & Generate Content
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --quiet anthropic pytrends

      - name: Run research agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: |
          if [ -n "$DATE_OVERRIDE" ]; then
            python -c "
          import datetime, os
          os.environ.setdefault('TODAY_OVERRIDE', os.environ.get('DATE_OVERRIDE',''))
          "
          fi
          python scripts/daily_research_agent.py

      - name: Generate CEO daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/daily_ceo_report.py

      - name: Generate avatar video (Synthesia)
        if: ${{ env.SYNTHESIA_API_KEY != '' }}
        env:
          SYNTHESIA_API_KEY: ${{ secrets.SYNTHESIA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CFG="avatar-config/soul_config.json"
          STATUS=$(python -c "import json; d=json.load(open('$CFG')); print(d.get('status',''))" 2>/dev/null || echo "")
          if [ "$STATUS" = "ready" ]; then
            python scripts/daily_avatar_video.py
          else
            echo "⚠️  Avatar not ready — run: python scripts/avatar_setup.py"
          fi

      - name: Commit & push new content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "Daily Research Bot"
          git config user.email "bot@prestige-legal.co.il"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          DATE=$(date +%Y-%m-%d)
          git add "daily-research/$DATE/"
          git diff --cached --quiet && echo "Nothing new to commit" && exit 0
          git commit -m "🔍 Daily research: $(date +%Y-%m-%d)"
          git push origin main

      - name: Telegram notification
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE=$(date +%Y-%m-%d)
          TOPIC=$(python -c "
          import json, sys
          try:
              with open(f'daily-research/$DATE/summary.json') as f:
                  d = json.load(f)
              print(d['top_topics'][0])
          except:
              print('נדל\"ן ומקרקעין')
          ")
          if [ -n "$TELEGRAM_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="🔍 <b>מחקר יומי הושלם</b>%0A📅 $DATE%0A🔑 נושא מוביל: <b>$TOPIC</b>%0A%0A📄 תיקייה: <code>daily-research/$DATE/</code>%0A✅ מאמר SEO | שאלות-תשובות | תסריט אווטר"
          fi
