name: 🚀 Deploy LAWDin to Vercel

# Auto-deploys the ldr/web app to Vercel production on every push to main.
# One-time setup: add three repo secrets (Settings → Secrets and variables →
# Actions): VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
#   - VERCEL_TOKEN:      Vercel → Account Settings → Tokens → create
#   - VERCEL_ORG_ID:     from ldr/web/.vercel/project.json after `vercel link`,
#                        or Vercel project Settings → General
#   - VERCEL_PROJECT_ID: same place

on:
  push:
    branches: [main]
    paths:
      - 'ldr/web/**'
      - '.github/workflows/deploy-lawdin.yml'
  workflow_dispatch:

concurrency:
  group: deploy-lawdin
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Require Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::error::Missing VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID. Add them in repo Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings (production)
        working-directory: ldr/web
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build (production)
        working-directory: ldr/web
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt to production
        working-directory: ldr/web
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
