name: "\U0001F4E2 Send Social Media Post"

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to post to"
        required: true
        type: choice
        options:
          - facebook
          - telegram
          - linkedin
          - instagram
          - all
      message:
        description: "The post content"
        required: true
        type: string

jobs:
  send-post:
    runs-on: ubuntu-latest
    steps:
      - name: "\U0001F4CB Post Details"
        run: |
          echo "Platform: ${{ inputs.platform }}"
          echo "Message: ${{ inputs.message }}"

      - name: "\U0001F4E4 Send to Facebook"
        if: inputs.platform == 'facebook' || inputs.platform == 'all'
        run: |
          curl -s -X POST "${{ secrets.ZAPIER_FACEBOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": $(echo '${{ inputs.message }}' | jq -Rs .)}"
          echo "Facebook: SENT"

      - name: "\U0001F4E4 Send to Telegram"
        if: inputs.platform == 'telegram' || inputs.platform == 'all'
        run: |
          curl -s -X POST "${{ secrets.ZAPIER_TELEGRAM }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": $(echo '${{ inputs.message }}' | jq -Rs .)}"
          echo "Telegram: SENT"

      - name: "\U0001F4E4 Send to LinkedIn"
        if: inputs.platform == 'linkedin' || inputs.platform == 'all'
        run: |
          curl -s -X POST "${{ secrets.ZAPIER_LINKEDIN }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": $(echo '${{ inputs.message }}' | jq -Rs .)}"
          echo "LinkedIn: SENT"

      - name: "\U0001F4E4 Send to Instagram"
        if: inputs.platform == 'instagram' || inputs.platform == 'all'
        run: |
          curl -s -X POST "${{ secrets.ZAPIER_INSTAGRAM }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": $(echo '${{ inputs.message }}' | jq -Rs .)}"
          echo "Instagram: SENT"

      - name: "\u2705 Summary"
        run: |
          echo "Post sent successfully to: ${{ inputs.platform }}"
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: "\ud83d\udd14 Notify via Telegram"
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && '\u2705 \u05d4\u05e6\u05dc\u05d9\u05d7' || '\u274c \u05e0\u05db\u05e9\u05dc' }}"
          MESSAGE="$STATUS \u2014 \u05e9\u05dc\u05d9\u05d7\u05ea \u05e4\u05d5\u05e1\u05d8 \u05d9\u05d3\u05e0\u05d9\u05ea
\u05e4\u05dc\u05d8\u05e4\u05d5\u05e8\u05de\u05d4: ${{ inputs.platform }}
\u05d6\u05de\u05df: $(date -u '+%d/%m/%Y %H:%M UTC')
Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "${{ secrets.ZAPIER_TELEGRAM }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": $(echo "$MESSAGE" | jq -Rs .)}"
