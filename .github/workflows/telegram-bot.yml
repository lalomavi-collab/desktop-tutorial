name: "🤖 Telegram Bot"

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# Never let two poller runs overlap: overlapping runs can each fetch the same
# Telegram updates before either confirms them, causing duplicate replies.
concurrency:
  group: telegram-bot
  cancel-in-progress: false

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  listen:
    name: "Process Telegram Commands"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "🤖 Run command listener"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ZAPIER_OUTLOOK_SEND: ${{ secrets.ZAPIER_OUTLOOK_SEND }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_SENDER_EMAIL: ${{ secrets.MS_SENDER_EMAIL }}
        run: python3 scripts/telegram_bot.py
