name: 📢 Social Media Agent — שליחת פוסטים

on:
  # Every Saturday at 16:00 UTC = 19:00 Israel Summer Time (UTC+3)
  schedule:
    - cron: '0 16 * * 6'

  # Manual trigger — run NOW from the Actions tab
  workflow_dispatch:
    inputs:
      telegram_url:
        description: 'Zapier Webhook — Telegram'
        required: false
        default: ''
      linkedin_url:
        description: 'Zapier Webhook — LinkedIn'
        required: false
        default: ''
      facebook_url:
        description: 'Zapier Webhook — Facebook'
        required: false
        default: ''
      force_send_id:
        description: 'Post ID to force-send (empty = all approved)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (print only, do not send)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send posts via Zapier webhooks
        env:
          # Prefer manually-entered URLs; fall back to repo Secrets
          ZAPIER_TELEGRAM: ${{ github.event.inputs.telegram_url || secrets.ZAPIER_TELEGRAM }}
          ZAPIER_LINKEDIN:  ${{ github.event.inputs.linkedin_url  || secrets.ZAPIER_LINKEDIN }}
          ZAPIER_FACEBOOK:  ${{ github.event.inputs.facebook_url  || secrets.ZAPIER_FACEBOOK }}
          FORCE_POST_ID:    ${{ github.event.inputs.force_send_id }}
          DRY_RUN:          ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/send-posts.js

      - name: Commit updated queue
        run: |
          git config user.name  "עידית — Social Agent"
          git config user.email "agent@social.bot"
          git add posts-queue.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "✅ פוסטים נשלחו [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      - name: "🔔 Notify via Telegram"
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && '✅ הצליח' || '❌ נכשל' }}"
          DRY="${{ inputs.dry_run == 'true' && ' (Dry Run)' || '' }}"
          MESSAGE=$(printf '%s\n' \
            "$STATUS Social Media Agent${DRY}" \
            "פוסט: ${{ inputs.force_send_id != '' && inputs.force_send_id || 'כל הפוסטים המאושרים' }}" \
            "זמן: $(date -u '+%d/%m/%Y %H:%M UTC')" \
            "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          curl -s -X POST "${{ secrets.ZAPIER_TELEGRAM }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": $(echo "$MESSAGE" | jq -Rs .)}"
