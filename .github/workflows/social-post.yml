name: 📢 Social Media Agent — שליחת פוסטים

on:
  # Every Saturday at 16:00 UTC = 19:00 Israel Summer Time (UTC+3)
  schedule:
    - cron: '0 16 * * 6'

  # Manual trigger — for testing NOW from GitHub Actions tab
  workflow_dispatch:
    inputs:
      force_send_id:
        description: 'Post ID to force-send (leave empty to send all approved)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (print only, do not send)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the updated queue back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send posts via Zapier webhooks
        env:
          ZAPIER_TELEGRAM: ${{ secrets.ZAPIER_TELEGRAM }}
          ZAPIER_LINKEDIN:  ${{ secrets.ZAPIER_LINKEDIN }}
          ZAPIER_FACEBOOK:  ${{ secrets.ZAPIER_FACEBOOK }}
          ZAPIER_TWITTER:   ${{ secrets.ZAPIER_TWITTER }}
          ZAPIER_INSTAGRAM: ${{ secrets.ZAPIER_INSTAGRAM }}
          FORCE_POST_ID:    ${{ github.event.inputs.force_send_id }}
          DRY_RUN:          ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/send-posts.js

      - name: Commit updated queue
        run: |
          git config user.name  "עידית — Social Agent"
          git config user.email "agent@social.bot"
          git add posts-queue.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "✅ סמן פוסטים שנשלחו [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
