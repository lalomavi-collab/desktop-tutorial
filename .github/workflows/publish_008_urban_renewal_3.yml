name: Publish Post 008 - Urban Renewal #3

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 19 5 *'  # May 19, 2026 at 08:00 UTC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Publish to Facebook
        run: |
          curl -X POST "${{ secrets.ZAPIER_FACEBOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "message": "3 שאלות שכל בעל דירה חייב לשאול לפני שהוא חותם על עסקת פינוי-בינוי:\n\nרוב בעלי הדירות מקבלים הצעה מיזם.\nקוראים אותה פעם אחת.\nשואלים שכן.\nחותמים.\n\nשלוש שנים אחרי — הם עדיין מחכים לדירה.\n\nשאלה 1: מה קורה אם היזם נקלע לקשיים פיננסיים באמצע הבנייה?\nמהו מנגנון ההגנה שלך?\nהאם יש ערבות בנקאית? מה גובהה?\n\nשאלה 2: מה מוגדר \"כוח עליון\" בחוזה — ומה לא?\nמי נושא בסיכון כשהלוח זמנים מתארך?\nהאם יש פיצוי שכירות מעוגן?\n\nשאלה 3: מי מייצג אותך — ורק אותך?\nעורך הדין שהיזם ממנה \"לעבור את הדיירים\" —\nהוא לא עורך הדין שלך.\nהוא עורך הדין של העסקה.\n\nייצוג אמיתי מתחיל לפני החתימה.\nלא אחריה.\n\nאם יש לך הצעת פינוי-בינוי על השולחן — שלח אותה. נבדוק אותה יחד.\n\n↳ LALUM | ייצוג בעלי דירות בעסקאות התחדשות עירונית\nwww.lalum.co\n\n#פינויבינוי #בעלידירות #נדלן #התחדשותעירונית #LALUM"
            }'

      - name: Publish to Telegram
        run: |
          curl -X POST "${{ secrets.ZAPIER_TELEGRAM }}" \
            -H "Content-Type: application/json" \
            -d '{
              "message": "3 שאלות לפני שחותמים על פינוי-בינוי:\n\n01 — מה קורה אם היזם נקלע לקשיים פיננסיים?\n02 — מה מוגדר \"כוח עליון\" — ומי נושא בסיכון?\n03 — עורך הדין של היזם הוא לא עורך הדין שלך.\n\nייצוג אמיתי מתחיל לפני החתימה.\n\n↳ LALUM | ייצוג בעלי דירות\nwww.lalum.co\n\n#פינויבינוי #בעלידירות #נדלן #התחדשותעירונית #LALUM"
            }'

      - name: Publish to Instagram
        run: |
          curl -X POST "${{ secrets.ZAPIER_INSTAGRAM }}" \
            -H "Content-Type: application/json" \
            -d '{
              "caption": "3 שאלות לפני שחותמים.\n\n01 — מה קורה אם היזם נקלע לקשיים?\n02 — מי נושא בסיכון כשהלוח זמנים מתארך?\n03 — עורך הדין של היזם לא עורך הדין שלך.\n\nייצוג אמיתי מתחיל לפני החתימה.\n\n↳ LALUM | ייצוג בעלי דירות\nwww.lalum.co\n\n#פינויבינוי #בעלידירות #נדלן #התחדשותעירונית #LALUM"
            }'

      - name: Publish to LinkedIn
        run: |
          curl -X POST "${{ secrets.ZAPIER_LINKEDIN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "3 questions every property owner must ask before signing an urban renewal deal:\n\nMost owners receive an offer from a developer.\nRead it once. Ask a neighbor. Sign.\n\nThree years later — they'\''re still waiting for their apartment.\n\nQuestion 1: What happens if the developer faces financial difficulties mid-construction?\nWhat is your protection mechanism?\nIs there a bank guarantee? What is its scope?\n\nQuestion 2: What qualifies as \"force majeure\" in the contract — and what doesn'\''t?\nWho bears the risk when the timeline extends?\nIs rental compensation contractually guaranteed?\n\nQuestion 3: Who represents you — and only you?\nThe attorney the developer appoints to \"handle the residents\"\nis not your attorney.\nThey represent the transaction.\nThose are two fundamentally different things.\n\nReal representation begins before the signature.\nNot after.\n\nIf you have an urban renewal proposal on your desk — send it over. We'\''ll review it together.\n\n↳ LALUM | Representing Property Owners in Urban Renewal\nwww.lalum.co\n\n#UrbanRenewal #PropertyOwners #RealEstateLaw #Israel #LALUM"
            }'
