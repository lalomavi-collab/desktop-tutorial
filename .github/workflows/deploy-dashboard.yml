name: 🚀 Deploy Agent Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'agent-dashboard/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: agent-dashboard
        run: npm install

      - name: Build
        working-directory: agent-dashboard
        run: npm run build
        env:
          BASE_URL: /desktop-tutorial/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: agent-dashboard/dist

      - id: deployment
        uses: actions/deploy-pages@v4
