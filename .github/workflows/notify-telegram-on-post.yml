name: '📢 Notify Telegram on Post Published'
on:
  workflow_dispatch:
      inputs:
            post_title:
                    description: 'Title of the published post'
                            required: true
                                  post_content:
                                          description: 'Content or summary of the post'
                                                  required: true
                                                        post_link:
                                                                description: 'URL to the published post'
                                                                        required: false
                                                                              platform:
                                                                                      description: 'Social media platform (Instagram, Facebook, LinkedIn, etc.)'
                                                                                              required: false
                                                                                                      default: 'Social Media'
                                                                                                      
                                                                                                      jobs:
                                                                                                        notify-telegram:
                                                                                                            runs-on: ubuntu-latest
                                                                                                                steps:
                                                                                                                      - name: Send Telegram Notification
                                                                                                                              run: |
                                                                                                                                        # Build the message
                                                                                                                                                  TITLE="${{ github.event.inputs.post_title }}"
                                                                                                                                                            CONTENT="${{ github.event.inputs.post_content }}"
                                                                                                                                                                      LINK="${{ github.event.inputs.post_link }}"
                                                                                                                                                                                PLATFORM="${{ github.event.inputs.platform }}"
                                                                                                                                                                                          
                                                                                                                                                                                                    # Create formatted message
                                                                                                                                                                                                              MESSAGE="📢 *New Post Published*%0A%0A"
                                                                                                                                                                                                                        MESSAGE="$MESSAGE*Platform:* $PLATFORM%0A"
                                                                                                                                                                                                                                  MESSAGE="$MESSAGE*Title:* $TITLE%0A%0A"
                                                                                                                                                                                                                                            MESSAGE="$MESSAGE*Preview:* $CONTENT%0A"
                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                if [ -n "$LINK" ]; then
                                                                                                                                                                                                                                                                            MESSAGE="$MESSAGE%0A🔗 [Read More]($LINK)"
                                                                                                                                                                                                                                                                                      fi
                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                          # Send to Telegram
                                                                                                                                                                                                                                                                                                                    curl -X POST \
                                                                                                                                                                                                                                                                                                                                "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                                                                                                                                                                                                                                                                                                                                            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                                                                                                                                                                                                                                                                                                                                                        -d "text=$MESSAGE" \
                                                                                                                                                                                                                                                                                                                                                                    -d "parse_mode=Markdown" \
                                                                                                                                                                                                                                                                                                                                                                                -w "\n"
                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                    echo "✅ Telegram notification sent successfully!"
