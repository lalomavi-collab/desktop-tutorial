name: "📢 Notify Telegram on Post Published"

on:
  workflow_dispatch:
    inputs:
      post_title:
        description: "Title of the published post"
        required: true
      post_content:
        description: "Content or summary of the post"
        required: true
      post_link:
        description: "URL to the published post (optional)"
        required: false
      platform:
        description: "Social media platform"
        required: false
        default: "Social Media"

jobs:
  notify-telegram:
    name: "📲 Send Telegram Notification"
    runs-on: ubuntu-latest
    steps:
      - name: "📤 Send notification"
        run: |
          TITLE="${{ inputs.post_title }}"
          CONTENT="${{ inputs.post_content }}"
          LINK="${{ inputs.post_link }}"
          PLATFORM="${{ inputs.platform }}"

          MESSAGE="📢 פוסט חדש פורסם!

כותרת: $TITLE
פלטפורמה: $PLATFORM
תוכן: $CONTENT"

          if [ -n "$LINK" ]; then
            MESSAGE="$MESSAGE
קישור: $LINK"
          fi

          MESSAGE="$MESSAGE
זמן: $(date -u '+%d/%m/%Y %H:%M UTC')"

          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": $(echo "$MESSAGE" | jq -Rs .)}")

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✅ Notification sent successfully"
          else
            echo "❌ Failed to send notification"
            exit 1
          fi
