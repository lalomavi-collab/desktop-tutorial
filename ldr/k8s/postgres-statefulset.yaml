# Data tier. NOTE: a database is stateful — this uses a StatefulSet with a
# PersistentVolumeClaim, NOT a generic `replicas: N` of identical pods.
# For multi-region read replicas on GCP, prefer Cloud SQL + read replicas
# (see ldr/docs — `gcloud sql instances create ... --master-instance-name=...`)
# routed via the Cloud SQL Auth Proxy, rather than self-managing here.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ldr
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ldr
            - name: POSTGRES_USER
              value: ldr
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ldr-secrets
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "ldr"]
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ldr
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
