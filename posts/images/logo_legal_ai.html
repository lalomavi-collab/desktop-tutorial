<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Legal AI Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Georgia', serif;
  }
  .canvas {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 60px;
  }
  .logo-label {
    color: #708090;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .variants {
    display: flex;
    gap: 80px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  .variant {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .variant-name {
    color: #708090;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="canvas">

  <div class="logo-label">Legal AI — Logo Concepts</div>

  <div class="variants">

    <!-- VARIANT A: Scale + Circuit nodes -->
    <div class="variant">
      <svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="goldGradA" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#D4AF37"/>
            <stop offset="100%" style="stop-color:#F5E6A3"/>
          </linearGradient>
          <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1B1B1B"/>
            <stop offset="100%" style="stop-color:#111111"/>
          </linearGradient>
        </defs>

        <!-- Background circle -->
        <circle cx="130" cy="130" r="125" fill="url(#bgA)" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>

        <!-- Outer ring dots (circuit nodes) -->
        <circle cx="130" cy="18" r="3" fill="#D4AF37" opacity="0.5"/>
        <circle cx="242" cy="130" r="3" fill="#D4AF37" opacity="0.5"/>
        <circle cx="130" cy="242" r="3" fill="#D4AF37" opacity="0.5"/>
        <circle cx="18" cy="130" r="3" fill="#D4AF37" opacity="0.5"/>
        <circle cx="202" cy="37" r="2" fill="#D4AF37" opacity="0.3"/>
        <circle cx="223" cy="202" r="2" fill="#D4AF37" opacity="0.3"/>
        <circle cx="37" cy="202" r="2" fill="#D4AF37" opacity="0.3"/>
        <circle cx="58" cy="37" r="2" fill="#D4AF37" opacity="0.3"/>

        <!-- Circuit lines from center -->
        <line x1="130" y1="60" x2="130" y2="40" stroke="#D4AF37" stroke-width="0.8" opacity="0.3"/>
        <line x1="200" y1="130" x2="220" y2="130" stroke="#D4AF37" stroke-width="0.8" opacity="0.3"/>
        <line x1="130" y1="200" x2="130" y2="220" stroke="#D4AF37" stroke-width="0.8" opacity="0.3"/>
        <line x1="60" y1="130" x2="40" y2="130" stroke="#D4AF37" stroke-width="0.8" opacity="0.3"/>

        <!-- Central pillar -->
        <rect x="128" y="85" width="4" height="120" fill="url(#goldGradA)" rx="2"/>

        <!-- Scale beam -->
        <rect x="72" y="110" width="116" height="3" fill="url(#goldGradA)" rx="1.5"/>

        <!-- Left pan chain -->
        <line x1="85" y1="113" x2="79" y2="148" stroke="#D4AF37" stroke-width="1.5" opacity="0.8"/>
        <!-- Right pan chain -->
        <line x1="175" y1="113" x2="181" y2="148" stroke="#D4AF37" stroke-width="1.5" opacity="0.8"/>

        <!-- Left pan -->
        <path d="M 65 148 Q 79 155 93 148" stroke="#D4AF37" stroke-width="2" fill="none"/>
        <line x1="65" y1="148" x2="93" y2="148" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>

        <!-- Right pan -->
        <path d="M 167 148 Q 181 155 195 148" stroke="#D4AF37" stroke-width="2" fill="none"/>
        <line x1="167" y1="148" x2="195" y2="148" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>

        <!-- Top ornament / AI node -->
        <circle cx="130" cy="83" r="10" fill="#1B1B1B" stroke="#D4AF37" stroke-width="1.5"/>
        <!-- AI symbol inside -->
        <text x="130" y="87" text-anchor="middle" fill="#D4AF37" font-size="9" font-family="Georgia" font-weight="bold">AI</text>

        <!-- Base -->
        <rect x="110" y="205" width="40" height="4" fill="url(#goldGradA)" rx="2"/>
        <rect x="118" y="200" width="24" height="6" fill="#D4AF37" opacity="0.6" rx="1"/>

        <!-- Neural nodes (small) -->
        <circle cx="85" cy="111.5" r="4" fill="#1B1B1B" stroke="#D4AF37" stroke-width="1.5"/>
        <circle cx="175" cy="111.5" r="4" fill="#1B1B1B" stroke="#D4AF37" stroke-width="1.5"/>

        <!-- Subtle hexagon pattern background -->
        <polygon points="130,55 142,62 142,76 130,83 118,76 118,62" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>

        <!-- Brand name -->
        <text x="130" y="236" text-anchor="middle" fill="#D4AF37" font-size="11" font-family="Georgia" letter-spacing="4">LEXAI</text>
        <text x="130" y="250" text-anchor="middle" fill="#708090" font-size="7.5" font-family="Georgia" letter-spacing="3">LEGAL INTELLIGENCE</text>
      </svg>
      <div class="variant-name">A — Circle Seal</div>
    </div>

    <!-- VARIANT B: Minimal wordmark + scale icon -->
    <div class="variant">
      <svg width="320" height="160" viewBox="0 0 320 160" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="goldGradB" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#D4AF37"/>
            <stop offset="100%" style="stop-color:#F5E6A3"/>
          </linearGradient>
        </defs>

        <!-- Background -->
        <rect width="320" height="160" fill="#1B1B1B" rx="8"/>
        <rect x="1" y="1" width="318" height="158" fill="none" stroke="#D4AF37" stroke-width="0.5" rx="7" opacity="0.4"/>

        <!-- Icon: scale mark (left side) -->
        <!-- Pillar -->
        <rect x="40" y="32" width="2.5" height="90" fill="#D4AF37" rx="1"/>
        <!-- Beam -->
        <rect x="20" y="54" width="60" height="2" fill="#D4AF37" rx="1"/>
        <!-- Left cup -->
        <path d="M20 56 Q30 68 40 56" stroke="#D4AF37" stroke-width="1.8" fill="none"/>
        <!-- Right cup -->
        <path d="M60 56 Q70 68 80 56" stroke="#D4AF37" stroke-width="1.8" fill="none"/>
        <!-- Chains -->
        <line x1="30" y1="56" x2="26" y2="70" stroke="#D4AF37" stroke-width="1.2"/>
        <line x1="70" y1="56" x2="74" y2="70" stroke="#D4AF37" stroke-width="1.2"/>
        <!-- Base -->
        <rect x="32" y="122" width="22" height="2.5" fill="#D4AF37" rx="1"/>
        <!-- AI node on top -->
        <circle cx="41" cy="30" r="7" fill="#1B1B1B" stroke="#D4AF37" stroke-width="1.2"/>
        <text x="41" y="33.5" text-anchor="middle" fill="#D4AF37" font-size="7" font-family="Georgia" font-weight="bold">AI</text>

        <!-- Divider line -->
        <line x1="95" y1="30" x2="95" y2="130" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>

        <!-- Wordmark -->
        <text x="115" y="88" fill="url(#goldGradB)" font-size="46" font-family="Georgia" font-weight="normal" letter-spacing="2">LEX</text>
        <text x="228" y="88" fill="#FFFDD0" font-size="46" font-family="Georgia" font-weight="normal" letter-spacing="1" opacity="0.9">AI</text>

        <!-- Tagline -->
        <line x1="115" y1="100" x2="285" y2="100" stroke="#D4AF37" stroke-width="0.5" opacity="0.5"/>
        <text x="200" y="116" text-anchor="middle" fill="#708090" font-size="9" font-family="Georgia" letter-spacing="4">LEGAL INTELLIGENCE</text>

        <!-- Circuit dots decoration -->
        <circle cx="115" cy="42" r="1.5" fill="#D4AF37" opacity="0.5"/>
        <circle cx="285" cy="42" r="1.5" fill="#D4AF37" opacity="0.5"/>
        <circle cx="115" cy="130" r="1.5" fill="#D4AF37" opacity="0.5"/>
        <circle cx="285" cy="130" r="1.5" fill="#D4AF37" opacity="0.5"/>
      </svg>
      <div class="variant-name">B — Horizontal Banner</div>
    </div>

    <!-- VARIANT C: Geometric / minimal icon only -->
    <div class="variant">
      <svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="goldGradC" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#D4AF37"/>
            <stop offset="100%" style="stop-color:#F5E6A3"/>
          </linearGradient>
        </defs>

        <!-- Dark square background -->
        <rect width="160" height="160" fill="#1B1B1B" rx="24"/>

        <!-- Geometric scale — ultra minimal -->
        <!-- Center vertical -->
        <line x1="80" y1="30" x2="80" y2="135" stroke="url(#goldGradC)" stroke-width="2.5" stroke-linecap="round"/>

        <!-- Horizontal beam -->
        <line x1="38" y1="62" x2="122" y2="62" stroke="url(#goldGradC)" stroke-width="2.5" stroke-linecap="round"/>

        <!-- Left triangle (pan) -->
        <polygon points="30,62 46,62 38,95" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>

        <!-- Right triangle (pan) -->
        <polygon points="114,62 130,62 122,95" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>

        <!-- AI hexagon at top -->
        <polygon points="80,18 90,24 90,36 80,42 70,36 70,24" fill="#D4AF37" opacity="0.15"/>
        <polygon points="80,18 90,24 90,36 80,42 70,36 70,24" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
        <text x="80" y="34" text-anchor="middle" fill="#D4AF37" font-size="10" font-family="Georgia" font-weight="bold">AI</text>

        <!-- Base line -->
        <line x1="62" y1="135" x2="98" y2="135" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round"/>

        <!-- Small node dots -->
        <circle cx="38" cy="62" r="3.5" fill="#D4AF37"/>
        <circle cx="122" cy="62" r="3.5" fill="#D4AF37"/>
        <circle cx="80" cy="62" r="3" fill="#1B1B1B" stroke="#D4AF37" stroke-width="1.5"/>

        <!-- Corner marks -->
        <line x1="10" y1="10" x2="22" y2="10" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
        <line x1="10" y1="10" x2="10" y2="22" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
        <line x1="150" y1="10" x2="138" y2="10" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
        <line x1="150" y1="10" x2="150" y2="22" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
        <line x1="10" y1="150" x2="22" y2="150" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
        <line x1="10" y1="150" x2="10" y2="138" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
        <line x1="150" y1="150" x2="138" y2="150" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
        <line x1="150" y1="150" x2="150" y2="138" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
      </svg>
      <div class="variant-name">C — Icon Only</div>
    </div>

  </div>

  <!-- Color palette -->
  <div style="display:flex; gap:12px; align-items:center;">
    <div style="width:28px;height:28px;background:#1B1B1B;border:1px solid #333;border-radius:6px;" title="Obsidian"></div>
    <div style="width:28px;height:28px;background:#D4AF37;border-radius:6px;" title="Gold"></div>
    <div style="width:28px;height:28px;background:#FFFDD0;border-radius:6px;" title="Cream"></div>
    <div style="width:28px;height:28px;background:#800020;border-radius:6px;" title="Burgundy"></div>
    <span style="color:#708090;font-size:11px;letter-spacing:2px;">PRESTIGE EXECUTIVE PALETTE</span>
  </div>

</div>
</body>
</html>
