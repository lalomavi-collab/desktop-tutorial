<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #1B1B1B; overflow: hidden; font-family: 'Georgia', serif; }
  .container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; position: relative; }
  .gold-top { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 200px; height: 4px; background: #D4AF37; }
  .gold-bottom { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 200px; height: 4px; background: #D4AF37; }
  .num { color: #D4AF37; font-size: 80px; font-family: 'Georgia', serif; line-height: 1; margin-bottom: 20px; opacity: 0.3; }
  .label { color: #D4AF37; font-size: 13px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; font-family: 'Arial', sans-serif; }
  h1 { color: #FFFDD0; font-size: 50px; line-height: 1.4; text-align: center; font-weight: 400; margin-bottom: 40px; }
  h1 span { color: #D4AF37; }
  .quote { color: #FFFDD0; font-size: 22px; line-height: 1.7; text-align: center; opacity: 0.75; margin-bottom: 50px; border-top: 1px solid rgba(212,175,55,0.3); border-bottom: 1px solid rgba(212,175,55,0.3); padding: 24px 0; }
  .brand { color: #D4AF37; font-size: 20px; letter-spacing: 4px; font-family: 'Arial', sans-serif; }
</style>
</head>
<body>
<div class="container">
  <div class="gold-top"></div>
  <div class="gold-bottom"></div>
  <div class="label">LALUM · התחדשות עירונית</div>
  <h1>הסכם בבהילות<br><span>מתפרק לאט.</span></h1>
  <div class="quote">אמון נבנה לפני שמושיטים חוזה.<br>לא אחריו.</div>
  <div class="brand">LALUM</div>
</div>
</body>
</html>
