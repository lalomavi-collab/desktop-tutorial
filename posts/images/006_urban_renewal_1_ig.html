<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #1B1B1B; font-family: 'Georgia', serif; overflow: hidden; }
  .container { width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; }
  .top-line { position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(to right, #D4AF37, transparent, #D4AF37); }
  .bottom-line { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(to right, #D4AF37, transparent, #D4AF37); }
  .label { color: #D4AF37; font-size: 14px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 50px; font-family: 'Arial', sans-serif; text-align: center; }
  h1 { color: #FFFDD0; font-size: 52px; line-height: 1.4; font-weight: 400; text-align: center; margin-bottom: 40px; }
  h1 span { color: #D4AF37; }
  .divider { width: 80px; height: 1px; background: #D4AF37; margin: 0 auto 40px; }
  .body { color: #FFFDD0; font-size: 24px; line-height: 1.8; opacity: 0.85; text-align: center; margin-bottom: 60px; }
  .brand { color: #D4AF37; font-size: 22px; letter-spacing: 4px; font-family: 'Arial', sans-serif; text-align: center; margin-bottom: 10px; }
  .url { color: #FFFDD0; font-size: 16px; opacity: 0.5; text-align: center; font-family: 'Arial', sans-serif; }
  .ornament-tl { position: absolute; top: 30px; right: 30px; width: 60px; height: 60px; border-top: 1px solid #D4AF37; border-right: 1px solid #D4AF37; opacity: 0.4; }
  .ornament-br { position: absolute; bottom: 30px; left: 30px; width: 60px; height: 60px; border-bottom: 1px solid #D4AF37; border-left: 1px solid #D4AF37; opacity: 0.4; }
</style>
</head>
<body>
<div class="container">
  <div class="top-line"></div>
  <div class="bottom-line"></div>
  <div class="ornament-tl"></div>
  <div class="ornament-br"></div>
  <div class="label">LALUM · התחדשות עירונית</div>
  <h1>פינוי-בינוי נתקע?<br>הבעיה<br><span>בקומה השנייה.</span></h1>
  <div class="divider"></div>
  <div class="body">המפתח הוא לא לחץ.<br>המפתח הוא <strong>ארכיטקטורה.</strong></div>
  <div class="brand">LALUM</div>
  <div class="url">www.lalum.co</div>
</div>
</body>
</html>
