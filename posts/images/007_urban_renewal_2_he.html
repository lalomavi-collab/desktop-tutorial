<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; background: #1B1B1B; font-family: 'Georgia', serif; overflow: hidden; }
  .container { width: 100%; height: 100%; position: relative; display: flex; align-items: center; }
  .sidebar { width: 8px; height: 100%; background: linear-gradient(to bottom, #D4AF37, #800020); flex-shrink: 0; }
  .content { padding: 55px 75px; flex: 1; }
  .label { color: #D4AF37; font-size: 12px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 28px; font-family: 'Arial', sans-serif; }
  h1 { color: #FFFDD0; font-size: 44px; line-height: 1.3; font-weight: 400; margin-bottom: 24px; }
  h1 em { color: #D4AF37; font-style: normal; }
  .body { color: #FFFDD0; font-size: 19px; line-height: 1.7; opacity: 0.8; margin-bottom: 32px; }
  .highlight { background: rgba(212,175,55,0.1); border-right: 3px solid #D4AF37; padding: 16px 20px; color: #FFFDD0; font-size: 18px; margin-bottom: 32px; }
  .footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(212,175,55,0.2); padding-top: 20px; }
  .brand { color: #D4AF37; font-size: 17px; letter-spacing: 3px; font-family: 'Arial', sans-serif; }
  .url { color: #FFFDD0; font-size: 14px; opacity: 0.5; font-family: 'Arial', sans-serif; }
</style>
</head>
<body>
<div class="container">
  <div class="sidebar"></div>
  <div class="content">
    <div class="label">התחדשות עירונית #2 · LALUM</div>
    <h1>הסכם שנחתם בבהילות —<br><em>מתפרק לאט.</em></h1>
    <div class="highlight">אמון לא נבנה עם חוזה בן 60 עמוד.<br>הוא נבנה לפני שמושיטים אותו.</div>
    <div class="body">→ מיפוי דיירים לפני כל מסמך<br>→ זיהוי ה"שוער" — הדייר שכולם מקשיבים לו<br>→ שקיפות שמורידה חרדה לפני שהיא עולה</div>
    <div class="footer">
      <div class="brand">LALUM</div>
      <div class="url">www.lalum.co</div>
    </div>
  </div>
</div>
</body>
</html>
