<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; background: #1B1B1B; overflow: hidden; font-family: 'Georgia', serif; }
  .container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 60px 80px; position: relative; }
  .corner-tl { position: absolute; top: 24px; left: 24px; width: 40px; height: 40px; border-top: 2px solid #D4AF37; border-left: 2px solid #D4AF37; }
  .corner-br { position: absolute; bottom: 24px; right: 24px; width: 40px; height: 40px; border-bottom: 2px solid #D4AF37; border-right: 2px solid #D4AF37; }
  .label { color: #D4AF37; font-size: 12px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 28px; font-family: Arial, sans-serif; }
  h1 { color: #FFFDD0; font-size: 52px; line-height: 1.3; font-weight: 400; margin-bottom: 28px; }
  h1 span { color: #D4AF37; }
  .sub { color: #FFFDD0; font-size: 22px; opacity: 0.7; line-height: 1.6; }
  .brand { position: absolute; bottom: 36px; right: 80px; color: #D4AF37; font-size: 16px; letter-spacing: 3px; font-family: Arial, sans-serif; }
</style>
</head>
<body>
<div class="container">
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <div class="label">LALUM · Future of Work</div>
  <h1>The Future<br>of <span>Work 2030</span></h1>
  <div class="sub">AI is the tool — you are the manager.</div>
  <div class="brand">LALUM | www.lalum.co</div>
</div>
</body>
</html>
