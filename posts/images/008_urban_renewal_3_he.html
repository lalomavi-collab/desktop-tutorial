<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; background: #1B1B1B; font-family: 'Georgia', serif; overflow: hidden; }
  .container { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
  .bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(212,175,55,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(212,175,55,0.04) 1px, transparent 1px); background-size: 60px 60px; }
  .content { position: relative; padding: 50px 80px; width: 100%; }
  .label { color: #D4AF37; font-size: 12px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; font-family: 'Arial', sans-serif; }
  h1 { color: #FFFDD0; font-size: 40px; font-weight: 400; margin-bottom: 32px; }
  h1 span { color: #D4AF37; }
  .questions { display: flex; gap: 30px; margin-bottom: 30px; }
  .q { flex: 1; border-top: 2px solid #D4AF37; padding-top: 16px; }
  .q-num { color: #D4AF37; font-size: 28px; font-family: 'Georgia', serif; margin-bottom: 10px; }
  .q-text { color: #FFFDD0; font-size: 16px; line-height: 1.5; opacity: 0.8; }
  .footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(212,175,55,0.2); padding-top: 20px; }
  .brand { color: #D4AF37; font-size: 16px; letter-spacing: 3px; font-family: 'Arial', sans-serif; }
  .url { color: #FFFDD0; font-size: 14px; opacity: 0.5; font-family: 'Arial', sans-serif; }
</style>
</head>
<body>
<div class="container">
  <div class="bg-grid"></div>
  <div class="content">
    <div class="label">פינוי-בינוי · LALUM</div>
    <h1><span>3 שאלות</span> שכל בעל דירה חייב לשאול<br>לפני שהוא חותם.</h1>
    <div class="questions">
      <div class="q">
        <div class="q-num">01</div>
        <div class="q-text">מה קורה אם היזם נקלע לקשיים פיננסיים באמצע הבנייה?</div>
      </div>
      <div class="q">
        <div class="q-num">02</div>
        <div class="q-text">מה מוגדר "כוח עליון" בחוזה — ומי נושא בסיכון?</div>
      </div>
      <div class="q">
        <div class="q-num">03</div>
        <div class="q-text">עורך הדין של היזם הוא לא עורך הדין שלך.</div>
      </div>
    </div>
    <div class="footer">
      <div class="brand">LALUM</div>
      <div class="url">www.lalum.co</div>
    </div>
  </div>
</div>
</body>
</html>
