# OpenClaw Configuration - Telegram Integration
# Documentation: https://docs.openclaw.ai/channels/telegram
#
# Gateway:  ws://127.0.0.1:18789
# Version:  2026.2.26
# Gateway Token is managed by OpenClaw internally (see dashboard)

channels:
  telegram:
    startup:
      auth:
        enabled: true
        # Bot token - set via environment variable (recommended)
        # or paste directly: botToken: "123456:your_token_here"
        botToken: ${TELEGRAM_BOT_TOKEN}

    # ── Update mode ──────────────────────────────────────────
    # "polling"  → simpler, good for local development (default)
    # "webhook"  → more efficient, requires a public HTTPS URL
    mode: "polling"

    # Uncomment and set for webhook mode:
    # webhookUrl: ${TELEGRAM_WEBHOOK_URL}

    # ── Access control ────────────────────────────────────────
    # DM policy options: open | pairing | allowlist | closed
    dmPolicy: "pairing"

    # Uncomment to restrict DMs to specific Telegram usernames:
    # allowFrom:
    #   - "@your_username"

    # Group chat policy options: open | allowlist | closed
    groupPolicy: "closed"

    # Uncomment to allow specific groups:
    # groups:
    #   - id: -1001234567890
    #     name: "My Group"

# ── AI Provider ───────────────────────────────────────────────
# Uncomment your chosen provider:
# provider:
#   anthropic:
#     apiKey: ${ANTHROPIC_API_KEY}
#     model: "claude-sonnet-4-6"
#
#   openai:
#     apiKey: ${OPENAI_API_KEY}
#     model: "gpt-4o"
